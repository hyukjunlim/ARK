includes:
  - configs/oc22/s2ef/base_crack.yml

model:
  name: gemnet_t
  num_spherical: 7
  num_radial: 6
  num_blocks: 4
  emb_size_atom: 64
  emb_size_edge: 64
  emb_size_trip: 32
  emb_size_rbf: 16
  emb_size_cbf: 16
  emb_size_bil_trip: 64
  num_before_skip: 1
  num_after_skip: 2
  num_concat: 1
  num_atom: 2
  cutoff: 5.0
  max_neighbors: 50
  rbf:
    name: gaussian
  envelope:
    name: polynomial
    exponent: 5
  cbf:
    name: spherical_harmonics
  extensive: True
  otf_graph: True
  output_init: HeOrthogonal
  activation: silu
  scale_file: configs/oc22/scaling_factors/gemnet-dT.json

  regress_forces: True
  direct_forces: True

optim:
  batch_size: 10
  eval_batch_size: 10
  # load_balancing: atoms
  eval_every: 5000
  num_workers: 2
  lr_initial: 5.e-4
  optimizer: AdamW
  optimizer_params:
    amsgrad: True
    weight_decay: 0  # 2e-6 (TF weight decay) / 1e-4 (lr) = 2e-2
  scheduler: ReduceLROnPlateau
  mode: min
  factor: 0.8
  patience: 3
  max_epochs: 80
  ema_decay: 0.999
  clip_grad_norm: 10
