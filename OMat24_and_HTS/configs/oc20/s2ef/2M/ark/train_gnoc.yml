includes:
  - configs/oc20/s2ef/2M/base_ark.yml

model:
  name: ark_gnoc
  num_spherical: 7
  num_radial: 32
  num_blocks: 2
  
  emb_size_atom: 64
  emb_size_edge: 128
  emb_size_trip_in: 32
  emb_size_trip_out: 32
  emb_size_quad_in: 16
  emb_size_quad_out: 16
  emb_size_aint_in: 32
  emb_size_aint_out: 32
  emb_size_rbf: 8
  emb_size_cbf: 8
  emb_size_sbf: 16

  num_before_skip: 2
  num_after_skip: 2
  num_concat: 1
  num_atom: 2
  num_output_afteratom: 2
  num_atom_emb_layers: 2
  num_global_out_layers: 2

  regress_forces: True
  direct_forces: True
  forces_coupled: False
  otf_graph: True

  cutoff: 6.0
  cutoff_qint: 6.0
  cutoff_aeaint: 6.0
  cutoff_aint: 6.0
  max_neighbors: 30
  max_neighbors_qint: 8
  max_neighbors_aeaint: 20
  max_neighbors_aint: 1000
  rbf:
    name: gaussian
  envelope:
    name: polynomial
    exponent: 5
  cbf:
    name: spherical_harmonics
  sbf:
    name: legendre_outer
  extensive: True
  output_init: HeOrthogonal
  activation: silu

  quad_interaction: False
  atom_edge_interaction: False
  edge_atom_interaction: False
  atom_interaction: False

  qint_tags: [1, 2]

  enforce_max_neighbors_strictly: False

  scale_file: configs/oc20/s2ef/2M/ark/scaling_factors/ark.pt

  teacher_model_args:
    num_spherical: 7
    num_radial: 128
    num_blocks: 4
    emb_size_atom: 256
    emb_size_edge: 512
    emb_size_trip_in: 64
    emb_size_trip_out: 64
    emb_size_quad_in: 32
    emb_size_quad_out: 32
    emb_size_aint_in: 64
    emb_size_aint_out: 64
    emb_size_rbf: 16
    emb_size_cbf: 16
    emb_size_sbf: 32
    num_before_skip: 2
    num_after_skip: 2
    num_concat: 1
    num_atom: 3
    num_output_afteratom: 3
    cutoff: 12.0
    cutoff_qint: 12.0
    cutoff_aeaint: 12.0
    cutoff_aint: 12.0
    max_neighbors: 30
    max_neighbors_qint: 8
    max_neighbors_aeaint: 20
    max_neighbors_aint: 1000
    rbf:
      name: gaussian
    envelope:
      name: polynomial
      exponent: 5
    cbf:
      name: spherical_harmonics
    sbf:
      name: legendre_outer
    extensive: True
    output_init: HeOrthogonal
    activation: silu

    regress_forces: True
    direct_forces: True
    forces_coupled: False
    otf_graph: True

    quad_interaction: True
    atom_edge_interaction: True
    edge_atom_interaction: True
    atom_interaction: True

    num_atom_emb_layers: 2
    num_global_out_layers: 2
    qint_tags: [1, 2]

    enforce_max_neighbors_strictly: False

optim:
  batch_size: 8
  eval_batch_size: 8
  eval_every: 5000
  num_workers: 2
  lr_initial: 5.e-4
  optimizer: AdamW
  optimizer_params:
    amsgrad: True
    weight_decay: 0  # 2e-6 (TF weight decay) / 1e-4 (lr) = 2e-2
  scheduler: LambdaLR
  scheduler_params:
    lambda_type: cosine
    warmup_epochs: 0.05
    warmup_factor: 0.2
    lr_min_factor: 0.01         
  mode: min
  factor: 0.8
  patience: 3
  max_epochs: 5
  ema_decay: 0.999
  clip_grad_norm: 10
